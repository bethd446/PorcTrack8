name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-hostinger-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and Deploy via FTP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
        env:
          # Vite : variables runtime exposees au build
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Test FTP path canary
        run: |
          echo "Deploy canary $(date -u +%Y-%m-%dT%H:%M:%SZ)" > /tmp/canary.txt
          curl -fsT /tmp/canary.txt --user "$FTP_USER:$FTP_PASSWORD" \
            "ftp://$FTP_HOST/domains/porctrack.tech/public_html/deploy-canary.txt"
          sleep 2
          curl -fsI https://porctrack.tech/deploy-canary.txt
          echo "Canary path validated"
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./dist/
          server-dir: /domains/porctrack.tech/public_html/
          log-level: standard
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/*.md
            **/.DS_Store
            **/.env*
            **/scripts/**
            **/src/**
            **/*.log
