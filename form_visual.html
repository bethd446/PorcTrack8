<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire d'Urgence | PorcTrack 8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700&family=Instrument+Sans:wght@400;500;700&display=swap');
        body { font-family: 'Instrument Sans', sans-serif; background-color: #f0f4f3; }
        .font-heading { font-family: 'Big Shoulders Display', cursive; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto bg-white p-6 rounded-[28px] shadow-sm">
        <h1 class="font-heading text-2xl uppercase mb-6 text-emerald-900">Nouvelle Saisie</h1>
        
        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Catégorie</label>
                <select class="w-full p-4 rounded-xl border border-gray-200">
                    <option>Santé Truie</option>
                    <option>Alimentation</option>
                    <option>Mortalité</option>
                </select>
            </div>
            
            <button class="w-full h-[58px] bg-red-500 text-white font-heading text-lg uppercase rounded-2xl active:scale-95 transition-transform">
                Urgence Sanitaire
            </button>
        </div>
    </div>
</body>
</html>
