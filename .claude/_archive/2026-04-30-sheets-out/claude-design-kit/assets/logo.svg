<svg viewBox="0 0 200 48" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .pig-icon { fill: #059669; }
      .text-logo { font-family: 'BigShoulders Text', sans-serif; font-size: 20px; font-weight: 700; fill: #059669; letter-spacing: 0.5px; }
    </style>
  </defs>

  <!-- VARIANT 1: Horizontal Logo (icône + texte) -->
  <g id="logo-horizontal">
    <!-- Pig Icon -->
    <g transform="translate(6, 12)">
      <!-- Snout (museau) -->
      <circle class="pig-icon" cx="8" cy="10" r="2.5" />
      <!-- Head (tête) -->
      <circle class="pig-icon" cx="8" cy="4" r="3.5" />
      <!-- Left Ear (oreille gauche) -->
      <rect class="pig-icon" x="2" y="-0.5" width="2" height="3" rx="1" />
      <!-- Right Ear (oreille droite) -->
      <rect class="pig-icon" x="12" y="-0.5" width="2" height="3" rx="1" />
      <!-- Body (corps) -->
      <ellipse class="pig-icon" cx="8" cy="11" rx="4" ry="5" />
      <!-- Back Leg Left (patte arrière gauche) -->
      <rect class="pig-icon" x="3.5" y="15" width="1.5" height="3" rx="0.75" />
      <!-- Back Leg Right (patte arrière droite) -->
      <rect class="pig-icon" x="11" y="15" width="1.5" height="3" rx="0.75" />
      <!-- Front Leg Left (patte avant gauche) -->
      <rect class="pig-icon" x="4.5" y="15.5" width="1.5" height="2.5" rx="0.75" />
      <!-- Front Leg Right (patte avant droite) -->
      <rect class="pig-icon" x="10" y="15.5" width="1.5" height="2.5" rx="0.75" />
      <!-- Tail (queue) - curved path -->
      <path class="pig-icon" d="M 12.5 11 Q 15 10 15.5 8" stroke="#059669" stroke-width="1.2" fill="none" stroke-linecap="round" />
    </g>

    <!-- Text "PorcTrack" -->
    <text class="text-logo" x="32" y="27">PorcTrack</text>
  </g>

  <!-- VARIANT 2: Icon Only (48x48 square) - positioned for reference at y=0 -->
  <g id="logo-icon" transform="translate(120, 0)">
    <!-- Background guide (invisible, for 48x48 bbox) -->
    <rect x="0" y="0" width="48" height="48" fill="none" />

    <!-- Centered pig icon -->
    <g transform="translate(24, 24)">
      <!-- Snout (museau) -->
      <circle class="pig-icon" cx="0" cy="4" r="2.5" />
      <!-- Head (tête) -->
      <circle class="pig-icon" cx="0" cy="-2" r="4" />
      <!-- Left Ear (oreille gauche) -->
      <rect class="pig-icon" x="-5" y="-6" width="2.5" height="4" rx="1.2" />
      <!-- Right Ear (oreille droite) -->
      <rect class="pig-icon" x="2.5" y="-6" width="2.5" height="4" rx="1.2" />
      <!-- Body (corps) -->
      <ellipse class="pig-icon" cx="0" cy="6" rx="5" ry="6" />
      <!-- Back Leg Left (patte arrière gauche) -->
      <rect class="pig-icon" x="-4" y="12" width="2" height="4" rx="1" />
      <!-- Back Leg Right (patte arrière droite) -->
      <rect class="pig-icon" x="2" y="12" width="2" height="4" rx="1" />
      <!-- Front Leg Left (patte avant gauche) -->
      <rect class="pig-icon" x="-2.5" y="12.5" width="2" height="3" rx="1" />
      <!-- Front Leg Right (patte avant droite) -->
      <rect class="pig-icon" x="0.5" y="12.5" width="2" height="3" rx="1" />
      <!-- Tail (queue) -->
      <path class="pig-icon" d="M 5.5 5 Q 8.5 3 9.5 0" stroke="#059669" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" />
    </g>
  </g>
</svg>
