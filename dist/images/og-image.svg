<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3d10"/>
      <stop offset="100%" style="stop-color:#2d5a1b"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circle -->
  <circle cx="1050" cy="100" r="300" fill="rgba(255,255,255,0.04)"/>
  <circle cx="150" cy="530" r="200" fill="rgba(255,255,255,0.03)"/>
  <!-- Badge -->
  <rect x="80" y="80" width="200" height="36" rx="18" fill="rgba(212,146,15,0.25)" stroke="#d4920f" stroke-width="1.5"/>
  <text x="180" y="104" text-anchor="middle" font-family="'Big Shoulders Display', Impact, sans-serif" font-size="14" fill="#d4920f" font-weight="700" letter-spacing="2">v8.2.0 · GTTT · OFFLINE-FIRST</text>
  <!-- Main title -->
  <text x="80" y="230" font-family="'Big Shoulders Display', Impact, sans-serif" font-size="100" fill="white" font-weight="900" letter-spacing="-1">PorcTrack 8</text>
  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Instrument Sans', system-ui, sans-serif" font-size="32" fill="rgba(255,255,255,0.75)">Gestion Technique de Troupeau Porcin</text>
  <!-- Stats row -->
  <text x="80" y="420" font-family="'Instrument Sans', system-ui, sans-serif" font-size="22" fill="rgba(255,255,255,0.55)">14 alertes biologiques  ·  Mode hors-ligne total  ·  Assistant IA Gemini</text>
  <!-- URL -->
  <text x="80" y="540" font-family="'DM Mono', monospace, sans-serif" font-size="20" fill="rgba(255,255,255,0.4)" letter-spacing="1">app.porctrack.tech</text>
  <!-- Accent bar -->
  <rect x="80" y="560" width="120" height="4" rx="2" fill="#d4920f"/>
</svg>
