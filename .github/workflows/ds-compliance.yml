name: DS v2.0 Compliance
on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
jobs:
  check-ds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check DS compliance
        run: |
          chmod +x scripts/check-ds-compliance.sh
          ./scripts/check-ds-compliance.sh
