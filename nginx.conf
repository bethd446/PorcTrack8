# ═══════════════════════════════════════════════════════════════════
# PorcTrack 8 — Configuration Nginx VPS
#
# Architecture subdomains :
#   porctrack.tech          → Site vitrine (/website/dist)
#   www.porctrack.tech      → Redirect → porctrack.tech
#   app.porctrack.tech      → Application React SPA (/app/dist)
#   admin.porctrack.tech    → Alias → app.porctrack.tech/admin
#
# Déploiement :
#   sudo cp nginx.conf /etc/nginx/sites-available/porctrack
#   sudo ln -sf /etc/nginx/sites-available/porctrack /etc/nginx/sites-enabled/porctrack
#   sudo nginx -t && sudo systemctl reload nginx
#
# Structure des fichiers sur le VPS :
#   /usr/share/nginx/html/website/   ← build du /website
#   /usr/share/nginx/html/app/       ← build du /app (Ionic/React)
#   /usr/share/nginx/html/downloads/ ← APK releases
# ═══════════════════════════════════════════════════════════════════

# ── Compression gzip ─────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
  text/plain
  text/css
  text/xml
  text/javascript
  application/javascript
  application/json
  application/xml
  image/svg+xml
  font/woff2;
gzip_min_length 1024;

# ── Redirect www → apex ───────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name www.porctrack.tech;

    return 301 https://porctrack.tech$request_uri;
}

# ══════════════════════════════════════════════════════════════════
# SITE VITRINE — porctrack.tech
# Sert le build du /website (Vite, HTML/CSS/JS statique)
# ══════════════════════════════════════════════════════════════════
server {
    listen 80;
    listen [::]:80;
    server_name porctrack.tech;

    root /usr/share/nginx/html/website;
    index index.html;

    # ── Sécurité headers ────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Route principale ────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # ── Assets Vite (hash dans le nom → cache long) ─────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Téléchargement APK ──────────────────────────────────────
    location /downloads/ {
        root /usr/share/nginx/html;
        add_header Content-Disposition "attachment";
        add_header Cache-Control "public, max-age=86400";
    }

    # ── Favicon / robots / sitemap ──────────────────────────────
    location = /robots.txt  { access_log off; log_not_found off; }
    location = /sitemap.xml { access_log off; }
    location = /favicon.ico { access_log off; log_not_found off; }

    # ── Logs ────────────────────────────────────────────────────
    access_log /var/log/nginx/porctrack.website.access.log;
    error_log  /var/log/nginx/porctrack.website.error.log;
}

# ══════════════════════════════════════════════════════════════════
# APPLICATION REACT SPA — app.porctrack.tech
# Sert le build du /app (Ionic React Vite, SPA routing)
# ══════════════════════════════════════════════════════════════════
server {
    listen 80;
    listen [::]:80;
    server_name app.porctrack.tech;

    root /usr/share/nginx/html/app;
    index index.html;

    # ── Sécurité headers ────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── SPA : toutes les routes → index.html ────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # ── Assets Vite (hash dans le nom → cache long) ─────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Polices et images ────────────────────────────────────────
    location /fonts/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }
    location /images/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    # ── Logs ────────────────────────────────────────────────────
    access_log /var/log/nginx/porctrack.app.access.log;
    error_log  /var/log/nginx/porctrack.app.error.log;
}

# ── NOTE HTTPS ──────────────────────────────────────────────────────
# Pour activer SSL avec Let's Encrypt (recommandé) :
#
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d porctrack.tech -d www.porctrack.tech -d app.porctrack.tech
#
# Certbot mettra à jour ce fichier automatiquement avec les blocs SSL.
# ════════════════════════════════════════════════════════════════════
