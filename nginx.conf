server {
    listen 80;
    server_name _;

    # ── Compression ──────────────────────────────────────────────
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ── Landing Page à la racine / ───────────────────────────────
    # Sert landing.html (pur HTML, zéro React/Ionic)
    location = / {
        root /usr/share/nginx/html;
        try_files /landing.html =404;
        add_header Cache-Control "no-cache";
    }

    # Fichiers statiques de la landing (favicon, images racine, etc.)
    location = /favicon.ico { root /usr/share/nginx/html; }

    # ── Téléchargement APK ───────────────────────────────────────
    location /downloads/ {
        root /usr/share/nginx/html;
        add_header Content-Disposition "attachment";
    }

    # ── Application React SPA sous /app/ ────────────────────────
    # Toutes les routes React sont gérées par index.html (SPA routing)
    location /app/ {
        alias /usr/share/nginx/html/app/;
        index index.html;
        try_files $uri $uri/ /app/index.html;
        add_header Cache-Control "no-cache";
    }

    # Assets buildés (JS/CSS avec hash dans le nom) → cache long
    location /app/assets/ {
        alias /usr/share/nginx/html/app/assets/;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Polices et images du build
    location /app/fonts/ {
        alias /usr/share/nginx/html/app/fonts/;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    location /app/images/ {
        alias /usr/share/nginx/html/app/images/;
        add_header Cache-Control "public, max-age=604800";
    }

    # ── Sécurité headers ─────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
