# ═══════════════════════════════════════════════════════════════════
# PorcTrack 8 — Configuration Nginx VPS
#
# Architecture subdomains :
#   porctrack.tech          → Site vitrine (/website/dist)
#   www.porctrack.tech      → Redirect → porctrack.tech
#   app.porctrack.tech      → Application React SPA (/app/dist)
#   admin.porctrack.tech    → Alias → app.porctrack.tech/admin
#
# Déploiement :
#   sudo cp nginx.conf /etc/nginx/sites-available/porctrack
#   sudo ln -sf /etc/nginx/sites-available/porctrack /etc/nginx/sites-enabled/porctrack
#   sudo nginx -t && sudo systemctl reload nginx
#
# Structure des fichiers sur le VPS :
#   /usr/share/nginx/html/website/   ← build du /website
#   /usr/share/nginx/html/app/       ← build du /app (Ionic/React)
#   /usr/share/nginx/html/downloads/ ← APK releases
#
# SSL :
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d porctrack.tech -d www.porctrack.tech -d app.porctrack.tech
# ═══════════════════════════════════════════════════════════════════

# ── Compression gzip ─────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
  text/plain
  text/css
  text/xml
  text/javascript
  application/javascript
  application/json
  application/xml
  image/svg+xml
  font/woff2;
gzip_min_length 1024;

# ══════════════════════════════════════════════════════════════════
# Redirect HTTP → HTTPS (apex + www + app)
# ══════════════════════════════════════════════════════════════════
server {
    listen 80;
    listen [::]:80;
    server_name porctrack.tech www.porctrack.tech app.porctrack.tech;

    return 301 https://$host$request_uri;
}

# ── Redirect www → apex (HTTPS) ───────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.porctrack.tech;

    ssl_certificate /etc/letsencrypt/live/porctrack.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/porctrack.tech/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    return 301 https://porctrack.tech$request_uri;
}

# ══════════════════════════════════════════════════════════════════
# SITE VITRINE — porctrack.tech (HTTPS)
# Sert le build du /website (Vite, HTML/CSS/JS statique)
# ══════════════════════════════════════════════════════════════════
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name porctrack.tech;

    # === SSL ===
    ssl_certificate /etc/letsencrypt/live/porctrack.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/porctrack.tech/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    root /usr/share/nginx/html/website;
    index index.html;

    # === Security headers ===
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https://*.supabase.co; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.porctrack.tech; media-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" always;

    # ── Route principale ────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # ── Assets Vite (hash dans le nom → cache long) ─────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Téléchargement APK ──────────────────────────────────────
    location /downloads/ {
        root /usr/share/nginx/html;
        add_header Content-Disposition "attachment";
        add_header Cache-Control "public, max-age=86400";
    }

    # ── Favicon / robots / sitemap ──────────────────────────────
    location = /robots.txt  { access_log off; log_not_found off; }
    location = /sitemap.xml { access_log off; }
    location = /favicon.ico { access_log off; log_not_found off; }

    # ── Logs ────────────────────────────────────────────────────
    access_log /var/log/nginx/porctrack.website.access.log;
    error_log  /var/log/nginx/porctrack.website.error.log;
}

# ══════════════════════════════════════════════════════════════════
# APPLICATION REACT SPA — app.porctrack.tech (HTTPS)
# Sert le build du /app (Ionic React Vite, SPA routing)
# ══════════════════════════════════════════════════════════════════
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.porctrack.tech;

    # === SSL ===
    ssl_certificate /etc/letsencrypt/live/porctrack.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/porctrack.tech/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    root /usr/share/nginx/html/app;
    index index.html;

    # === Security headers ===
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https://*.supabase.co; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.porctrack.tech; media-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" always;

    # ── SPA : toutes les routes → index.html ────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # ── Assets Vite (hash dans le nom → cache long) ─────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Polices et images ────────────────────────────────────────
    location /fonts/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }
    location /images/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    # ── Logs ────────────────────────────────────────────────────
    access_log /var/log/nginx/porctrack.app.access.log;
    error_log  /var/log/nginx/porctrack.app.error.log;
}
